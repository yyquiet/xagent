name: Publish Sandbox Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v0.1.0, latest)'
        required: true
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  SANDBOX_IMAGE: xprobe/xagent-sandbox
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    timeout-minutes: 60
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ env.SANDBOX_IMAGE }}:${{ github.event.inputs.tag }}
          cache-from: type=registry,ref=${{ env.SANDBOX_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SANDBOX_IMAGE }}:buildcache,mode=max
