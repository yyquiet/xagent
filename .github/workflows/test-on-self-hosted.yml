name: Test on self-hosted

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/xagent/sandbox/**'
      - 'tests/sandbox/**'
      - '.github/workflows/test-boxlite.yml'
  push:
    branches:
      - main
    paths:
      - 'src/xagent/sandbox/**'
      - 'tests/sandbox/**'
      - '.github/workflows/test-boxlite.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-on-self-hosted:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure uv is available
        shell: bash
        run: |
          set -e
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv not found, installing..."
            python3 -m pip install --user uv
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          # Use python -m uv to be safe
          python3 -m uv --version || uv --version

      - name: Create virtual environment (if not exists)
        shell: bash
        run: |
          set -e
          # 使用 python3 -m uv 确保 uv 命令可用
          _UV="python3 -m uv"
          $_UV --version
          # Use Python 3.12 for onnxruntime-gpu compatibility
          $_UV venv --python 3.12

      - name: Install dependencies
        shell: bash
        run: |
          set -e
          python3 -m uv sync --extra dev --extra deepdoc

      - name: Check and setup KVM
        shell: bash
        run: |
          echo "=== Checking KVM availability ==="
          if [ -e /dev/kvm ]; then
            echo "✓ /dev/kvm exists"
            ls -l /dev/kvm
            # Check if current user has access
            if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
              echo "✓ Current user has read/write access to /dev/kvm"
            else
              echo "⚠ Current user does not have access to /dev/kvm"
              echo "Attempting to fix permissions..."
              sudo chmod 666 /dev/kvm 2>/dev/null || echo "Failed to change permissions (may need manual setup)"
            fi
          else
            echo "✗ /dev/kvm does not exist"
            echo ""
            echo "=== CPU Virtualization Support ==="
            # Check using lscpu
            if command -v lscpu >/dev/null 2>&1; then
              echo "lscpu virtualization info:"
              lscpu | grep -i virtualization || echo "  No virtualization info from lscpu"
              echo ""
            fi
            # Check CPU flags
            echo "CPU flags check:"
            if grep -E 'vmx|svm' /proc/cpuinfo > /dev/null; then
              echo "✓ CPU supports virtualization"
              grep -m1 'flags' /proc/cpuinfo | grep -oE '(vmx|svm)' | head -1
              echo "Attempting to load KVM modules..."
              sudo modprobe kvm 2>/dev/null || echo "Failed to load kvm module"
              # Try Intel or AMD specific module
              if grep -q 'vmx' /proc/cpuinfo; then
                echo "Detected Intel CPU (vmx), loading kvm_intel..."
                sudo modprobe kvm_intel 2>/dev/null || echo "Failed to load kvm_intel"
              elif grep -q 'svm' /proc/cpuinfo; then
                echo "Detected AMD CPU (svm), loading kvm_amd..."
                sudo modprobe kvm_amd 2>/dev/null || echo "Failed to load kvm_amd"
              fi
              # Check again
              if [ -e /dev/kvm ]; then
                echo "✓ /dev/kvm created successfully"
                sudo chmod 666 /dev/kvm 2>/dev/null || echo "Failed to change permissions"
                ls -l /dev/kvm
              else
                echo "✗ Failed to create /dev/kvm"
                echo "Please check:"
                echo "  1. Virtualization is enabled in BIOS/UEFI"
                echo "  2. KVM kernel modules are available"
                echo "  3. If running in a VM, nested virtualization is enabled"
              fi
            else
              echo "✗ CPU does not support virtualization"
              echo "  vmx (Intel) or svm (AMD) flags NOT found in /proc/cpuinfo"
              echo ""
              echo "Possible reasons:"
              echo "  - Running in a VM without nested virtualization enabled"
              echo "  - Running in a container environment"
              echo "  - Physical CPU doesn't support virtualization"
              echo "  - Virtualization disabled in BIOS/UEFI"
            fi
          fi
          echo ""
          echo "=== System Information ==="
          echo "Current user: $(whoami)"
          echo "Current user groups: $(groups)"
          echo "Loaded KVM modules:"
          lsmod | grep kvm || echo "  (none)"

      - name: Run tests
        shell: bash
        run: |
          set -e
          python3 -m uv run python -m pytest tests/sandbox/test_boxlite_sandbox.py -v -s
