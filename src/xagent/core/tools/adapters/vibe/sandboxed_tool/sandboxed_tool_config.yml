# Sandboxed tool configuration
# Configure tool sandbox runtime options, dependencies, and environment variables
# Base dependencies (pydantic, pydantic-settings) are automatically installed, no need to list here
#
# Format:
#   tool_name:
#     sandbox_enabled: true           # Whether to run in sandbox (optional, default false)
#     packages: [dependency list]     # Packages to install in sandbox
#     env_vars: [env variable list]   # Environment variables to inject
#     tool_class: module.path:ClassName  # Reconstruct tool object in sandbox
#       Generates: tool = Class(); result = tool.run_json_sync(args)

# ============================================
# Code execution tools
# ============================================

execute_python_code:
  sandbox_enabled: true
  tool_class: "xagent.core.tools.adapters.vibe.python_executor:PythonExecutorTool"
  packages:
    - pandas>=1.3.0
    - numpy>=1.21.0
    - matplotlib>=3.5.0
  env_vars: []

execute_javascript_code:
  sandbox_enabled: true
  tool_class: "xagent.core.tools.adapters.vibe.javascript_executor:JavaScriptExecutorTool"
  packages: []
  env_vars: []
