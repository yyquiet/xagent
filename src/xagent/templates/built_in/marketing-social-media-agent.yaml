id: marketing-social-media-agent
name: Social Media Agent
category: Marketing
featured: true
descriptions:
  en: Transforms a single brief into platform-native content and visuals for all major
    channels. Schedules content and queues it for your approval before publishing.
  zh: 将单一简报转化为所有主要渠道的平台原生内容和视觉效果。安排内容并将其加入队列，等待您的批准后再发布。
features:
  en:
  - Writes posts tailored for each social platform
  - Creates matching visuals in the right sizes
  - Schedules content and queues it for your approval before publishing
  zh:
  - 撰写为每个社交平台量身定制的帖子
  - 创建合适尺寸的匹配视觉效果
  - 安排内容并将其加入队列，等待您的批准后再发布
